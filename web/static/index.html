<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Screams sensor</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<h1>Screams sensor</h1>

	<div class="panels">
		<iframe src="/grafana/d-solo/adm6d76/iot-screams?orgId=1&timezone=browser&refresh=auto&panelId=panel-1"></iframe>
		<iframe src="/grafana/d-solo/adm6d76/iot-screams?orgId=1&timezone=browser&refresh=auto&panelId=panel-2"></iframe>
	</div>

	<div class="controls">
		<button id="buzz" class="hidden" type="button">Buzz</button>
		<a id="login" class="hidden" href="/signin">Sign in to enable controls</a>
		<span id="status" class="status"></span>
	</div>

	<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
	<script src="/app.js"></script>
</body>
</html>
