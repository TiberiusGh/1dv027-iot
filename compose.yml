services:
  influx:
    container_name: influxDB
    image: influxdb:3-core
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --plugin-dir=/var/lib/influxdb3/plugins
    volumes:
      - influxDB-data:/var/lib/influxdb3
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana
    ports:
      - '8320:3000'
    environment:
      - GF_SERVER_ROOT_URL=https://screams.tiberiusgh.com/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=1s
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto
    ports:
      - '172.17.0.1:1883:1883' # docker0 gateway — host + bridge containers only, no LAN
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - mosquitto-data:/mosquitto/data
    restart: unless-stopped

  telegraf:
    container_name: telegraf
    image: telegraf
    depends_on:
      - mosquitto
      - influx
    env_file: .env
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    restart: unless-stopped

  frontend:
    container_name: frontend
    image: caddy:alpine
    depends_on:
      - grafana
      - mosquitto
    ports:
      - '8335:80'
    environment:
      - MQTT_BUZZER_PASS=${MQTT_BUZZER_PASS}
    volumes:
      - ./web/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web/static:/srv/static:ro
    restart: unless-stopped

volumes:
  influxDB-data:
  grafana-data:
  mosquitto-data:
