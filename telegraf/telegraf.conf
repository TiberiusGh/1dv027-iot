[agent]
  interval = "1s"
  flush_interval = "1s"
  omit_hostname = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["audio/fake"]
  username = "telegraf"
  password = "${MQTT_TELEGRAF_PASS}"
  data_format = "influx"

[[outputs.http]]
  url = "http://influx:8181/api/v3/write_lp?db=iot"
  method = "POST"
  data_format = "influx"
  [outputs.http.headers]
    Authorization = "Bearer ${INFLUX_TOKEN}"
